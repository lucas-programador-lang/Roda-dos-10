<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Principal — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-circle-dot"></i> Roda dos <span>10</span>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="active"><i class="fa-solid fa-chart-pie"></i> Meu Painel</a></li>
                <li><a href="afiliados.html"><i class="fa-solid fa-users"></i> Afiliados</a></li>
                <li><a href="perfil.html"><i class="fa-solid fa-user"></i> Perfil</a></li>
                <li><a href="#" id="btn-logout" class="logout-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-layout">
        <header class="page-header">
            <div>
                <h1 id="welcome-user">Olá, ...</h1>
                <p>Bem-vindo ao seu painel de controle financeiro.</p>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="premium-card">
                <div class="card-icon"><i class="fa-solid fa-wallet"></i></div>
                <h3>Saldo Disponível</h3>
                <h2 id="dash-balance">R$ 0,00</h2>
                <p class="card-detail">Atualizado em tempo real</p>
            </div>

            <div class="premium-card">
                <div class="card-icon"><i class="fa-solid fa-ticket"></i></div>
                <h3>Minhas Cotas / Ativas</h3>
                <h2 id="dash-tickets">0</h2>
                <p class="card-detail">Participe dos sorteios ativos</p>
            </div>
        </div>
    </main>

    <div class="toast-wrapper" id="toastBox">
        <i class="fa-solid fa-circle-check" id="toastIcon"></i>
        <span id="toastMessage">Sucesso!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
            authDomain: "roda-dos-10.firebaseapp.com",
            databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
            projectId: "roda-dos-10",
            storageBucket: "roda-dos-10.firebasestorage.app",
            messagingSenderId: "1072183237747",
            appId: "1:1072183237747:web:3a41a635187df2db809e06"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        function showToast(message, isError = false) {
            const toast = document.getElementById("toastBox");
            const icon = document.getElementById("toastIcon");
            const msgSpan = document.getElementById("toastMessage");
            msgSpan.innerText = message;
            toast.style.borderLeftColor = isError ? "#EF4444" : "#10B981";
            icon.className = isError ? "fa-solid fa-circle-xmark" : "fa-solid fa-circle-check";
            icon.style.color = isError ? "#EF4444" : "#10B981";
            toast.classList.add("active");
            setTimeout(() => toast.classList.remove("active"), 3500);
        }

        // Segurança e Escuta em Tempo Real
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("welcome-user").innerText = `Olá, ${user.displayName || 'Usuário'}`;
                
                // Sincroniza Saldo e Cotas do banco de dados automaticamente
                const userRef = ref(db, `users/${user.uid}`);
                onValue(userRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        document.getElementById("dash-balance").innerText = `R$ ${parseFloat(data.balance || 0).toFixed(2).replace('.', ',')}`;
                        document.getElementById("dash-tickets").innerText = data.tickets || 0;
                    }
                });
            } else {
                window.location.href = "login.html";
            }
        });

        // Evento Sair da Conta (Logout)
        document.getElementById("btn-logout").addEventListener("click", (e) => {
            e.preventDefault();
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });
    </script>
</body>
</html>
