<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Carteira - Roda dos 10</title>
    <style>
    :root {
        --bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --neon: #22d3ee;
        --text: #f8fafc;
    }
    body { 
        background: radial-gradient(circle at top right, #1e293b, #0f172a); 
        color: var(--text); 
        font-family: 'Segoe UI', sans-serif; 
        margin: 0; padding: 20px; min-height: 100vh;
    }
    .container { max-width: 600px; margin: auto; }
    h1 { color: var(--neon); text-align: center; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
    
    /* Cartão Premium */
    .card { 
        background: var(--card-bg); 
        backdrop-filter: blur(10px);
        padding: 20px; 
        border-radius: 16px; 
        margin-bottom: 20px; 
        border: 1px solid rgba(255,255,255,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: transform 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); border-color: var(--neon); }
    
    .info p { margin: 0; }
    .plano-nome { font-weight: bold; font-size: 1.2rem; color: var(--neon); }
    .status-tag { 
        background: rgba(34, 211, 238, 0.1); 
        color: var(--neon); 
        padding: 5px 12px; 
        border-radius: 20px; 
        font-size: 0.8rem; 
        text-transform: uppercase;
        font-weight: bold;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Minha Carteira</h1>
        <div id="wallet-list">
            </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
        authDomain: "roda-dos-10.firebaseapp.com",
        databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
        projectId: "roda-dos-10",
        storageBucket: "roda-dos-10.firebasestorage.app",
        messagingSenderId: "1072183237747",
        appId: "1:1072183237747:web:3a41a635187df2db809e06"
    };

    // Inicialize apenas uma vez
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const comprasRef = ref(db, `users/${user.uid}/compras`);
            onValue(comprasRef, (snapshot) => {
                const list = document.getElementById("wallet-list");
                list.innerHTML = "";
                
                let temAprovado = false;
                
                snapshot.forEach((child) => {
                    const compra = child.val();
                    
                    if (compra.status === 'aprovado') {
                        temAprovado = true;
                        list.innerHTML += `
                            <div class="card">
                                <div class="info">
                                    <div class="plano-nome">${compra.nomePlano}</div>
                                    <p>Cotas: ${compra.quantidade}</p>
                                    <small>Data: ${compra.data}</small>
                                </div>
                                <div class="status-tag">✔ Confirmado</div>
                            </div>
                        `;
                    }
                });

                if (!temAprovado) {
                    list.innerHTML = "<p style='text-align: center;'>Você ainda não possui compras aprovadas.</p>";
                }
            });
        } else {
            window.location.href = "login.html"; // Redireciona se não estiver logado
        }
    });
</script>
</body>
</html>
