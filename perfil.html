<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segurança da Conta — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
        :root {
            /* Fundo Carbon Deep Blue - Profundidade e Elegância */
            --bg-dark-base: #0B0F17; 
            
            /* Textura de fundo sutil para ambiente profissional */
            --bg-texture: radial-gradient(circle at 50% 0%, rgba(0, 230, 118, 0.05) 0%, rgba(11, 15, 23, 0) 70%);
            
            /* Cards com Glassmorphism */
            --bg-dark-card: rgba(20, 29, 43, 0.75); 
            
            /* Identidade de Cores */
            --whatsapp-green: #00E676;
            --text-neon: #02FF8A; 
            --logo-gold: linear-gradient(135deg, #FFF59D 0%, #FFB300 60%, #E65100 100%);
            --text-white: #FFFFFF; 
            --text-muted: #64748B; 
            --border-soft: rgba(255, 255, 255, 0.04);
            --radius-premium: 20px;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg-dark-base); 
            background-image: var(--bg-texture);
            color: var(--text-white); 
            padding-top: 110px; 
            padding-bottom: 60px; 
        }

        /* FLOATING NAVBAR */
        .navbar {
            background: rgba(15, 23, 36, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-soft);
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: calc(100% - 40px);
            max-width: 1160px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .nav-container { margin: 0 auto; padding: 0.7rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--text-white); text-decoration: none; }
        .logo span { background: var(--logo-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo i { color: var(--whatsapp-green); margin-right: 6px; }
        .nav-menu { display: flex; align-items: center; gap: 1.2rem; list-style: none; }
        .nav-menu a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.88rem; padding: 0.5rem 0.8rem; border-radius: 10px; transition: var(--transition-smooth); }
        .nav-menu a:hover { color: var(--text-white); background: rgba(255, 255, 255, 0.03); }
        .nav-menu a.active { color: var(--text-neon); background: rgba(0, 230, 118, 0.06); }
        .logout-link { color: #F87171 !important; }

        /* CONTENT */
        .page-header { text-align: center; margin-bottom: 2.5rem; }
        .page-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .page-header p { color: var(--text-muted); }

        .premium-card { 
            background: var(--bg-dark-card); 
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-soft); 
            border-radius: var(--radius-premium); 
            padding: 2.5rem; 
            max-width: 500px; 
            margin: 0 auto; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25); 
        }
        .card-icon { font-size: 2.5rem; color: #FFB300; margin-bottom: 1.2rem; }
        
        .instruction-text { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.8rem; }
        
        .btn-reset-password { 
            width: 100%; 
            background: var(--logo-gold); 
            color: #000; 
            border: none; 
            padding: 0.9rem; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: var(--transition-smooth); 
        }
        .btn-reset-password:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 179, 0, 0.35); }

        /* TOAST */
        .toast-wrapper { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 1rem 1.5rem; border-radius: 12px; z-index: 999999; width: calc(100% - 2rem); max-width: 400px; opacity: 0; transition: var(--transition-smooth); border-left: 5px solid; }
        .toast-wrapper.active { top: 30px; opacity: 1; }
        .toast-success { background: #0E1420; border-color: var(--whatsapp-green); }
        .toast-error { background: #0E1420; border-color: #EF4444; }

        @media (max-width: 768px) {
            body { padding-top: 150px; }
            .premium-card { width: calc(100% - 20px); }
        }
</style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="logo"><i class="fa-solid fa-circle-dot"></i> Roda dos <span>10</span></a>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Painel</a></li>
                <li><a href="afiliados.html"><i class="fa-solid fa-users"></i> Afiliados</a></li>
                <li><a href="perfil.html" class="active"><i class="fa-solid fa-user"></i>Perfil</a></li>
                <li><a href="carteira.html"><i class="fa-solid fa-wallet"></i> Carteira</a></li>
                <li><a href="#" id="btn-logout" class="logout-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-layout">
        <header class="page-header">
            <h1>Segurança de Acesso</h1>
            <p>Gerencie as credenciais da sua conta privada de forma automatizada.</p>
        </header>

        <<div class="premium-card">
    <div class="card-icon"><i class="fa-solid fa-lock"></i></div>
    <h3>Alterar Minha Senha</h3>
    
    <div id="password-form" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
        <div class="input-group-icon">
            <i class="fa-solid fa-unlock-keyhole"></i>
            <input type="password" id="current-password" placeholder="Senha Atual" required style="width: 100%; background: #0E1420; border: 1px solid var(--border-soft); padding: 1rem 1rem 1rem 3rem; border-radius: 12px; color: white;">
        </div>
        <div class="input-group-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="new-password" placeholder="Nova Senha" required style="width: 100%; background: #0E1420; border: 1px solid var(--border-soft); padding: 1rem 1rem 1rem 3rem; border-radius: 12px; color: white;">
        </div>
        <div class="input-group-icon">
            <i class="fa-solid fa-check-double"></i>
            <input type="password" id="confirm-password" placeholder="Confirmar Nova Senha" required style="width: 100%; background: #0E1420; border: 1px solid var(--border-soft); padding: 1rem 1rem 1rem 3rem; border-radius: 12px; color: white;">
        </div>
        <button id="btn-update-password" class="btn-reset-password">Atualizar Senha</button>
    </div>

    <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--border-soft);">
    
    <p class="instruction-text" style="margin-bottom: 1rem;">Esqueceu a senha atual? Use o botão abaixo:</p>
    <button id="btn-send-reset" class="btn-reset-password" style="background: rgba(255,255,255,0.05); color: var(--text-white);">
        <i class="fa-regular fa-envelope"></i> Redefinir pelo E-mail
    </button>
</div>
    </main>

    <div class="toast-wrapper" id="toastBox">
        <i id="toastIcon" class="fa-solid"></i>
        <span id="toastMessage">Status</span>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { 
        getAuth, onAuthStateChanged, sendPasswordResetEmail, signOut, 
        updatePassword, EmailAuthProvider, reauthenticateWithCredential 
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
        authDomain: "roda-dos-10.firebaseapp.com",
        databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
        projectId: "roda-dos-10",
        storageBucket: "roda-dos-10.firebasestorage.app",
        messagingSenderId: "1072183237747",
        appId: "1:1072183237747:web:3a41a635187df2db809e06"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    let userEmail = "";

    function showFeedback(message, isSuccess = true) {
        const toast = document.getElementById("toastBox");
        const icon = document.getElementById("toastIcon");
        const msgSpan = document.getElementById("toastMessage");

        toast.className = `toast-wrapper active ${isSuccess ? 'toast-success' : 'toast-error'}`;
        icon.className = isSuccess ? "fa-solid fa-circle-check" : "fa-solid fa-circle-xmark";
        icon.style.color = isSuccess ? "#10B981" : "#EF4444";
        msgSpan.innerText = message;

        setTimeout(() => toast.classList.remove("active"), 4000);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userEmail = user.email;
        } else {
            window.location.href = "login.html";
        }
    });

    // Lógica para Alterar Senha (Campos Obrigatórios)
    document.getElementById("btn-update-password").addEventListener("click", async () => {
        const currentPass = document.getElementById("current-password").value;
        const newPass = document.getElementById("new-password").value;
        const confirmPass = document.getElementById("confirm-password").value;

        if (!currentPass || !newPass || !confirmPass) {
            showFeedback("Preencha todos os campos obrigatórios.", false);
            return;
        }

        if (newPass !== confirmPass) {
            showFeedback("As novas senhas não coincidem!", false);
            return;
        }

        const user = auth.currentUser;
        
        if (!user) {
            showFeedback("Usuário não autenticado.", false);
            return;
        }

        const credential = EmailAuthProvider.credential(user.email, currentPass);

        try {
            // Reautentica para permitir a troca
            await reauthenticateWithCredential(user, credential);
            // Atualiza para a nova senha
            await updatePassword(user, newPass);
            showFeedback("Senha alterada com sucesso!");
            // Limpa os campos
            document.getElementById("current-password").value = "";
            document.getElementById("new-password").value = "";
            document.getElementById("confirm-password").value = "";
        } catch (error) {
            showFeedback("Erro: Verifique se sua senha atual está correta.", false);
        }
    });

    // Lógica para envio de e-mail (Recuperação)
    document.getElementById("btn-send-reset").addEventListener("click", () => {
        if (!userEmail) return;
        sendPasswordResetEmail(auth, userEmail)
            .then(() => showFeedback(`Instruções enviadas para: ${userEmail}`))
            .catch((error) => showFeedback(`Falha ao disparar e-mail: ${error.message}`, false));
    });

    // Logout
    document.getElementById("btn-logout").addEventListener("click", (e) => {
        e.preventDefault();
        signOut(auth).then(() => { window.location.href = "login.html"; });
    });
</script>
</body>
</html>
