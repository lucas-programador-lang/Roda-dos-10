<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
  <style>
/* ==========================================================================
   AUTENTICAÇÃO ULTRA PREMIUM — RODA DOS 10
   ========================================================================== */

/* Container de Autenticação com centralização total e efeito de profundidade 3D */
.auth-wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
    background-color: var(--bg-dark-base);
    
    /* Mix de Linhas de Grade Modernas + Auras de Luz de Alta Performance */
    background-image: 
        /* 1. Aura de luz dourada focada atrás do card central */
        radial-gradient(circle at 50% 50%, rgba(245, 166, 35, 0.07) 0%, transparent 45%),
        /* 2. Aura esverdeada sutil no canto inferior direito para quebrar a monotonia */
        radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.04) 0%, transparent 40%),
        /* 3. Linhas horizontais milimétricas simulando uma tela de alta tecnologia */
        linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
        /* 4. Linhas verticais milimétricas completando o Grid Premium */
        linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
        
    /* Define o tamanho exato dos quadradinhos da grade de fundo */
    background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
    background-attachment: fixed;
    position: relative;
    overflow: hidden;
}

/* Detalhe estético extra: Círculo de luz flutuante abstrato no canto superior */
.auth-wrapper::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(245, 166, 35, 0.03) 0%, transparent 70%);
    top: -200px;
    left: -100px;
    pointer-events: none;
}

/* Container Principal com efeito Glassmorphism avançado */
.auth-container {
    background: linear-gradient(145deg, rgba(18, 28, 50, 0.9) 0%, rgba(12, 19, 34, 0.95) 100%);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 24px;
    width: 100%;
    max-width: 430px;
    padding: 3rem 2.5rem;
    position: relative;
    box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.2),
        0 25px 60px -12px rgba(0, 0, 0, 0.7),
        inset 0 1px 1px rgba(255, 255, 255, 0.08);
    transition: var(--transition-smooth);
    z-index: 2;
}

/* Linha de brilho metálico premium no topo do card */
.auth-container::before {
    content: "";
    position: absolute;
    top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.4), transparent);
}

/* Cabeçalho do Card */
.auth-header { 
    text-align: center; 
    margin-bottom: 2.2rem; 
}

.auth-header .logo { 
    font-size: 1.8rem; 
    font-weight: 800; 
    margin-bottom: 0.6rem; 
    display: block; 
    letter-spacing: -0.5px;
}

.auth-header p { 
    color: var(--text-muted); 
    font-size: 0.92rem; 
    line-height: 1.5;
}

/* Estilização de Inputs Avançada */
.input-group-icon { 
    position: relative; 
    margin-bottom: 1.4rem; 
}

.input-group-icon i {
    position: absolute;
    left: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1.05rem;
    transition: var(--transition-smooth);
    pointer-events: none;
}

.input-group-icon input {
    width: 100%;
    background: #090E17;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 1.1rem 1rem 1.1rem 3.2rem;
    border-radius: 14px;
    color: #FFFFFF;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.2px;
    transition: var(--transition-smooth);
}

/* Placeholder sutil */
.input-group-icon input::placeholder {
    color: rgba(148, 163, 184, 0.4);
}

/* Efeito de foco neon e troca de cor do ícone */
.input-group-icon input:focus {
    border-color: #F5A623;
    background: #0D1421;
    outline: none;
    box-shadow: 0 0 0 4px rgba(245, 166, 35, 0.12);
}

.input-group-icon input:focus + i { 
    color: #F5A623; 
    transform: translateY(-50%) scale(1.05);
}

/* Seção de Lembrar de Mim e Esqueceu a Senha */
.remember-forgot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.88rem;
    margin-bottom: 2rem;
}

/* Customização Premium do Checkbox */
.checkbox-label { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    color: var(--text-muted); 
    cursor: pointer; 
    user-select: none;
    transition: var(--transition-smooth);
}

.checkbox-label:hover {
    color: var(--text-white);
}

.checkbox-label input { 
    accent-color: #F5A623; 
    width: 18px; 
    height: 18px; 
    cursor: pointer; 
    border-radius: 6px;
}

/* Link de Recuperação Elegante */
.forgot-link { 
    color: var(--text-muted); 
    text-decoration: none; 
    font-weight: 500;
    transition: var(--transition-smooth); 
}

.forgot-link:hover { 
    color: #F5A623;
    text-shadow: 0 0 8px rgba(245, 166, 35, 0.3);
}

/* Botão de Login Metálico Ouro */
.btn-login {
    width: 100%;
    background: linear-gradient(135deg, #FFE57F 0%, #F5A623 50%, #D48C11 100%);
    background-size: 200% auto;
    border: none;
    padding: 1.1rem;
    border-radius: 14px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    font-size: 1rem;
    color: #05080E;
    margin-bottom: 1.2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(245, 166, 35, 0.2);
    transition: var(--transition-smooth);
}

.btn-login:hover { 
    background-position: right center;
    transform: translateY(-2px); 
    box-shadow: 0 8px 25px rgba(245, 166, 35, 0.4); 
}

.btn-login:active {
    transform: translateY(-0.5px);
}

/* Rodapé do Card */
.auth-footer { 
    text-align: center; 
    margin-top: 1.8rem; 
    font-size: 0.88rem; 
    color: var(--text-muted); 
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    padding-top: 1.5rem;
}

.auth-footer a { 
    color: var(--whatsapp-green); 
    text-decoration: none; 
    font-weight: 700; 
    transition: var(--transition-smooth);
}

.auth-footer a:hover { 
    color: #FFF;
    text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
}

/* ==========================================================================
   OTIMIZAÇÃO RESPONSIVA E COMPORTAMENTO DESKTOP
   ========================================================================== */

/* Dispositivos Grandes (Monitores e Telas de Alta Resolução) */
@media (min-width: 1024px) {
    .auth-container {
        padding: 3.5rem 3rem;
        max-width: 450px;
    }
    .auth-container:hover {
        border-color: rgba(245, 166, 35, 0.2);
        box-shadow: 
            0 30px 60px -10px rgba(0, 0, 0, 0.8),
            0 0 50px -5px rgba(245, 166, 35, 0.05);
    }
}

/* Dispositivos Mobile (Smartphones) */
@media (max-width: 480px) {
    .auth-wrapper {
        padding: 1rem;
    }
    .auth-container {
        padding: 2.2rem 1.6rem;
        border-radius: 20px;
    }
    .auth-header .logo {
        font-size: 1.6rem;
    }
    .remember-forgot {
        flex-direction: row;
        gap: 8px;
        font-size: 0.82rem;
    }
    .checkbox-label input {
        width: 16px;
        height: 16px;
    }
    .btn-login {
        padding: 1rem;
    }
}
</style>
    </head>
    <body>
        
            <div class="auth-wrapper">
            <div class="auth-container premium-glass">
            <div class="auth-header">
            <div class="logo">
            <i class="fa-solid fa-circle-dot"></i> Roda dos <span>10</span>
            </div>
                <p>Entre na sua conta para gerenciar seus planos e afiliados</p>
            </div> 


            <form id="login-form" autocomplete="off">
                <div class="input-block">
                    <label for="login-email">E-mail</label>
                    <div class="input-group-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="login-password">Senha</label>
                    <div class="input-group-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me"> Lembrar de mim
                    </label>
                    <a href="#" class="forgot-link" id="btn-forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i> Acessar Conta
                </button>
            </form>

            <div class="auth-footer">
                Não tem uma conta? <a href="register.html">Cadastre-se</a>
            </div>

        </div>
    </div>

    <div class="toast-wrapper" id="toastBox">
        <i class="fa-solid fa-circle-check" id="toastIcon"></i>
        <span id="toastMessage">Sucesso!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Substitua pelas credenciais oficiais do seu console do Firebase
              const firebaseConfig = {
              apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
              authDomain: "roda-dos-10.firebaseapp.com",
              databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
              projectId: "roda-dos-10",
              storageBucket: "roda-dos-10.firebasestorage.app",
              messagingSenderId: "1072183237747",
              appId: "1:1072183237747:web:3a41a635187df2db809e06"
            };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Sistema central de Toast Feedback
        function showToast(message, isError = false) {
            const toast = document.getElementById("toastBox");
            const icon = document.getElementById("toastIcon");
            const msgSpan = document.getElementById("toastMessage");
            
            msgSpan.innerText = message;
            toast.style.borderLeftColor = isError ? "#EF4444" : "#10B981";
            icon.className = isError ? "fa-solid fa-circle-xmark" : "fa-solid fa-circle-check";
            icon.style.color = isError ? "#EF4444" : "#10B981";
            
            toast.classList.add("active");
            setTimeout(() => toast.classList.remove("active"), 3500);
        }

        // Lógica de Autenticação / Login
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const rememberMe = document.getElementById('remember-me').checked;

            try {
                // Define se a sessão dura para sempre (local) ou fecha com a aba (session)
                const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);

                // Executa login oficial
                await signInWithEmailAndPassword(auth, email, password);
                
                showToast("Login realizado! Redirecionando...");
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (error) {
                console.error("Erro no login:", error.code);
                // Tratamentos customizados premium para o usuário
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    showToast("E-mail ou senha inválidos.", true);
                } else if (error.code === 'auth/invalid-email') {
                    showToast("Formato de e-mail incorreto.", true);
                } else if (error.code === 'auth/too-many-requests') {
                    showToast("Muitas tentativas bloqueadas. Tente mais tarde.", true);
                } else {
                    showToast("Erro ao conectar com o servidor.", true);
                }
            }
        });

        // Lógica de recuperação de senha ("Esqueceu a senha?")
        document.getElementById('btn-forgot-password').addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();

            if (!email) {
                showToast("Digite seu e-mail no campo acima primeiro.", true);
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                showToast("E-mail de recuperação enviado! Verifique sua caixa de entrada.");
            } catch (error) {
                if (error.code === 'auth/invalid-email') {
                    showToast("Formato de e-mail inválido.", true);
                } else {
                    showToast("Erro ao enviar recuperação de senha.", true);
                }
            }
        });
    </script>
</body>
</html>
