<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
 <style>
    /* ==========================================================================
       CONTAINER & CENÁRIO DE AUTENTICAÇÃO
       ========================================================================== */
    .auth-wrapper {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 1.5rem;
        background-color: var(--surface-base);
        
        /* Mix de Linhas de Grade Modernas + Auras de Luz de Alta Performance */
        background-image: 
            /* 1. Aura de luz dourada focada atrás do card central */
            radial-gradient(circle at 50% 50%, rgba(245, 166, 35, 0.07) 0%, transparent 45%),
            /* 2. Aura esverdeada sutil no canto inferior direito */
            radial-gradient(circle at 85% 85%, var(--accent-glow) 0%, transparent 40%),
            /* 3. Linhas horizontais milimétricas simulando Grid Premium */
            linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
            /* 4. Linhas verticais milimétricas completando o Grid */
            linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            
        background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        background-attachment: fixed;
        position: relative;
        overflow: hidden;
    }

    /* Detalhe estético extra: Círculo de luz flutuante abstrato */
    .auth-wrapper::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(245, 166, 35, 0.03) 0%, transparent 70%);
        top: -200px;
        left: -100px;
        pointer-events: none;
    }

    /* ==========================================================================
       CONTAINER PRINCIPAL (GLASSMORPHISM)
       ========================================================================== */
    .auth-container {
        background: linear-gradient(145deg, rgba(17, 26, 46, 0.9) 0%, rgba(11, 18, 31, 0.95) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border-hairline);
        border-radius: var(--radius-lg);
        width: 100%;
        max-width: 430px;
        padding: 3rem 2.5rem;
        position: relative;
        box-shadow: 
            0 4px 6px -1px rgba(0, 0, 0, 0.2),
            0 25px 60px -12px rgba(0, 0, 0, 0.7),
            inset 0 1px 1px rgba(255, 255, 255, 0.08);
        transition: all var(--duration-base) var(--ease-out);
        z-index: 2;
    }

    /* Linha de brilho metálico premium no topo do card */
    .auth-container::before {
        content: "";
        position: absolute;
        top: 0; left: 10%; right: 10%; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.4), transparent);
    }

    /* ==========================================================================
       ELEMENTOS DE MARCA E CABEÇALHO
       ========================================================================== */
    .logo-wrapper {
        display: flex;
        justify-content: center;
        margin-bottom: 1rem;
    }

    .logo-img {
        max-height: 70px;
        width: auto;
        filter: drop-shadow(0 4px 15px rgba(245, 166, 35, 0.3));
        transition: all var(--duration-base) var(--ease-spring);
    }

    .logo-img:hover {
        transform: scale(1.05);
        filter: drop-shadow(0 0 25px rgba(245, 166, 35, 0.5));
    }

    .auth-header { 
        text-align: center; 
        margin-bottom: 2.2rem; 
    }

    .auth-header p { 
        color: var(--text-muted); 
        font-size: 0.92rem; 
        line-height: 1.5;
        font-weight: 300;
    }

    /* Oculta com segurança a redundância de texto antiga */
    .auth-header .logo { display: none; }

    /* ==========================================================================
       FORMULÁRIOS & CAMPOS DE ENTRADA
       ========================================================================== */
    .input-group-icon { 
        position: relative; 
        margin-bottom: 1.4rem; 
    }

    .input-group-icon i {
        position: absolute;
        left: 1.2rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 1.05rem;
        transition: all var(--duration-fast) var(--ease-out);
        pointer-events: none;
    }

    .input-group-icon input {
        width: 100%;
        background: var(--surface-base);
        border: 1px solid var(--border-hairline);
        padding: 1.1rem 1rem 1.1rem 3.2rem;
        border-radius: var(--radius-md);
        color: var(--text-primary);
        font-size: 0.95rem;
        font-weight: 500;
        letter-spacing: 0.2px;
        transition: all var(--duration-base) var(--ease-out);
    }

    .input-group-icon input::placeholder {
        color: rgba(148, 163, 184, 0.35);
    }

    /* Efeito de foco neon alinhado com a paleta Ouro do Login */
    .input-group-icon input:focus {
        border-color: var(--gold-mid);
        background: #0D1421;
        outline: none;
        box-shadow: 0 0 0 4px rgba(245, 166, 35, 0.12);
    }

    .input-group-icon input:focus + i { 
        color: var(--gold-mid); 
        transform: translateY(-50%) scale(1.05);
        filter: drop-shadow(0 0 4px var(--gold-glow));
    }

    /* ==========================================================================
       LEMBRAR DE MIM & RECUPERAÇÃO DE SENHA
       ========================================================================== */
    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.88rem;
        margin-bottom: 2rem;
    }

    .checkbox-label { 
        display: flex; 
        align-items: center; 
        gap: 10px; 
        color: var(--text-muted); 
        cursor: pointer; 
        user-select: none;
        transition: color var(--duration-fast) var(--ease-out);
    }

    .checkbox-label:hover {
        color: var(--text-primary);
    }

    .checkbox-label input { 
        accent-color: var(--gold-mid); 
        width: 18px; 
        height: 18px; 
        cursor: pointer; 
        border-radius: 6px;
    }

    .forgot-link { 
        color: var(--text-muted); 
        text-decoration: none; 
        font-weight: 500;
        transition: all var(--duration-fast) var(--ease-out); 
    }

    .forgot-link:hover { 
        color: var(--gold-mid);
        text-shadow: 0 0 8px var(--gold-glow);
    }

    /* ==========================================================================
       BOTÃO DE DISPARO (ESTILO OURO LÍQUIDO)
       ========================================================================== */
    .btn-login {
        width: 100%;
        background: var(--gold-gradient);
        background-size: 200% auto;
        border: none;
        padding: 1.1rem;
        border-radius: var(--radius-md);
        font-family: var(--font-display);
        font-weight: 800;
        letter-spacing: 0.5px;
        cursor: pointer;
        font-size: 1rem;
        color: var(--surface-base);
        margin-bottom: 1.2rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 15px rgba(245, 166, 35, 0.15);
        transition: all var(--duration-base) var(--ease-spring);
    }

    .btn-login:hover { 
        background-position: right center;
        transform: translateY(-2px); 
        box-shadow: 0 8px 25px var(--gold-glow); 
    }

    .btn-login:active {
        transform: translateY(-0.5px);
    }

    /* Rodapé da Caixa de Diálogo */
    .auth-footer { 
        text-align: center; 
        margin-top: 1.8rem; 
        font-size: 0.88rem; 
        color: var(--text-muted); 
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        padding-top: 1.5rem;
    }

    .auth-footer a { 
        color: var(--accent-primary); 
        text-decoration: none; 
        font-weight: 700; 
        transition: all var(--duration-fast) var(--ease-out);
    }

    .auth-footer a:hover { 
        color: var(--text-primary);
        text-shadow: 0 0 10px var(--accent-glow);
    }

    /* ==========================================================================
       OTIMIZAÇÕES DE COMPORTAMENTO RESPONSIVO
       ========================================================================== */
    @media (min-width: 1024px) {
        .auth-container {
            padding: 3.5rem 3rem;
            max-width: 450px;
        }
        .auth-container:hover {
            border-color: rgba(245, 166, 35, 0.2);
            box-shadow: 
                0 30px 60px -10px rgba(0, 0, 0, 0.8),
                0 0 50px -5px rgba(245, 166, 35, 0.05);
        }
    }

    @media (max-width: 480px) {
        .auth-wrapper {
            padding: 1rem;
        }
        .auth-container {
            padding: 2.2rem 1.6rem;
            border-radius: var(--radius-md);
        }
        .remember-forgot {
            flex-direction: row;
            gap: 8px;
            font-size: 0.82rem;
        }
        .checkbox-label input {
            width: 16px;
            height: 16px;
        }
        .btn-login {
            padding: 1rem;
        }
    }
</style>
    </head>
    <body>
        
            <div class="auth-wrapper">
            <div class="auth-container premium-glass">
            <div class="auth-header">
            <div class="logo-wrapper">
            <img src="logo.png" alt="Roda dos 10" class="logo-img">
            </div>
            <p>Entre na sua conta para gerenciar seus planos e afiliados</p>
            </div>

            <form id="login-form" autocomplete="off">
                <div class="input-block">
                    <label for="login-email">E-mail</label>
                    <div class="input-group-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="login-password">Senha</label>
                    <div class="input-group-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me"> Lembrar de mim
                    </label>
                    <a href="#" class="forgot-link" id="btn-forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-right-to-bracket"></i> Acessar Conta
                </button>
            </form>

            <div class="auth-footer">
                Não tem uma conta? <a href="register.html">Cadastre-se</a>
            </div>

        </div>
    </div>

    <div class="toast-wrapper" id="toastBox">
        <i class="fa-solid fa-circle-check" id="toastIcon"></i>
        <span id="toastMessage">Sucesso!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Substitua pelas credenciais oficiais do seu console do Firebase
              const firebaseConfig = {
              apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
              authDomain: "roda-dos-10.firebaseapp.com",
              databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
              projectId: "roda-dos-10",
              storageBucket: "roda-dos-10.firebasestorage.app",
              messagingSenderId: "1072183237747",
              appId: "1:1072183237747:web:3a41a635187df2db809e06"
            };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Sistema central de Toast Feedback
        function showToast(message, isError = false) {
            const toast = document.getElementById("toastBox");
            const icon = document.getElementById("toastIcon");
            const msgSpan = document.getElementById("toastMessage");
            
            msgSpan.innerText = message;
            toast.style.borderLeftColor = isError ? "#EF4444" : "#10B981";
            icon.className = isError ? "fa-solid fa-circle-xmark" : "fa-solid fa-circle-check";
            icon.style.color = isError ? "#EF4444" : "#10B981";
            
            toast.classList.add("active");
            setTimeout(() => toast.classList.remove("active"), 3500);
        }

        // Lógica de Autenticação / Login
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const rememberMe = document.getElementById('remember-me').checked;

            try {
                // Define se a sessão dura para sempre (local) ou fecha com a aba (session)
                const persistenceType = rememberMe ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);

                // Executa login oficial
                await signInWithEmailAndPassword(auth, email, password);
                
                showToast("Login realizado! Redirecionando...");
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);

            } catch (error) {
                console.error("Erro no login:", error.code);
                // Tratamentos customizados premium para o usuário
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    showToast("E-mail ou senha inválidos.", true);
                } else if (error.code === 'auth/invalid-email') {
                    showToast("Formato de e-mail incorreto.", true);
                } else if (error.code === 'auth/too-many-requests') {
                    showToast("Muitas tentativas bloqueadas. Tente mais tarde.", true);
                } else {
                    showToast("Erro ao conectar com o servidor.", true);
                }
            }
        });

        // Lógica de recuperação de senha ("Esqueceu a senha?")
        document.getElementById('btn-forgot-password').addEventListener('click', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();

            if (!email) {
                showToast("Digite seu e-mail no campo acima primeiro.", true);
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                showToast("E-mail de recuperação enviado! Verifique sua caixa de entrada.");
            } catch (error) {
                if (error.code === 'auth/invalid-email') {
                    showToast("Formato de e-mail inválido.", true);
                } else {
                    showToast("Erro ao enviar recuperação de senha.", true);
                }
            }
        });
    </script>
</body>
</html>
