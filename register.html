<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Container de Autenticação */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            background-color: var(--bg-dark-base);
            background-image: var(--bg-texture);
        }

        .auth-container {
            background: var(--bg-dark-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-premium);
            width: 100%;
            max-width: 460px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header .logo { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; display: block; }
        .auth-header p { color: var(--text-muted); font-size: 0.9rem; }

        /* Inputs com Ícones */
        .input-group-icon { position: relative; margin-bottom: 1.2rem; }
        .input-group-icon i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: var(--transition-smooth);
        }
        .input-group-icon input {
            width: 100%;
            background: #0E1420;
            border: 1px solid var(--border-soft);
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }
        .input-group-icon input:focus {
            border-color: var(--whatsapp-green);
            background: #131B2A;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 230, 118, 0.1);
        }
        .input-group-icon input:focus + i { color: var(--whatsapp-green); }

        /* Termos e Condições */
        .terms-label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.8rem;
            line-height: 1.5;
            cursor: pointer;
        }
        .terms-label input {
            accent-color: var(--whatsapp-green);
            margin-top: 3px;
            cursor: pointer;
        }
        .terms-label a { color: var(--whatsapp-green); text-decoration: none; font-weight: 600; }

        /* Rodapé de autenticação */
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .auth-footer a { color: var(--whatsapp-green); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-container premium-glass">
            
            <div class="auth-header">
                <div class="logo">
                    <i class="fa-solid fa-circle-dot"></i> Roda dos <span>10</span>
                </div>
                <p>Crie sua conta para acompanhar suas cotas e comissões</p>
            </div>

            <form id="register-form" autocomplete="off">
                <div class="input-block">
                    <label for="reg-name">Nome Completo</label>
                    <div class="input-group-icon">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Ex: José Lucas" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="reg-email">E-mail</label>
                    <div class="input-group-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="reg-password">Senha</label>
                    <div class="input-group-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="reg-ref">Código de Indicação (Opcional)</label>
                    <div class="input-group-icon">
                        <i class="fa-solid fa-user-plus"></i>
                        <input type="text" id="reg-ref" placeholder="Ex: REF12345">
                    </div>
                </div>

                <label class="terms-label">
                    <input type="checkbox" id="reg-terms" required>
                    <span>Declaro que li e concordo com os Termos de Serviço e as Políticas de Uso da plataforma Roda dos 10.</span>
                </label>

                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-user-check"></i> Concluir Cadastro
                </button>
            </form>

            <div class="auth-footer">
                Já possui uma conta? <a href="login.html">Fazer Login</a>
            </div>

        </div>
    </div>

    <div class="toast-wrapper" id="toastBox">
        <i class="fa-solid fa-circle-check" id="toastIcon"></i>
        <span id="toastMessage">Sucesso!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Suas credenciais oficiais configuradas com a URL do Database corrigida
        const firebaseConfig = {
            apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
            authDomain: "roda-dos-10.firebaseapp.com",
            databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
            projectId: "roda-dos-10",
            storageBucket: "roda-dos-10.firebasestorage.app",
            messagingSenderId: "1072183237747",
            appId: "1:1072183237747:web:3a41a635187df2db809e06"
        };

        // Inicializando os módulos do ecossistema Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Feedback visual dinâmico (Toast)
        function showToast(message, isError = false) {
            const toast = document.getElementById("toastBox");
            const icon = document.getElementById("toastIcon");
            const msgSpan = document.getElementById("toastMessage");
            
            msgSpan.innerText = message;
            toast.style.borderLeftColor = isError ? "#EF4444" : "#10B981";
            icon.className = isError ? "fa-solid fa-circle-xmark" : "fa-solid fa-circle-check";
            icon.style.color = isError ? "#EF4444" : "#10B981";
            
            toast.classList.add("active");
            setTimeout(() => toast.classList.remove("active"), 3500);
        }

        // Captura automática de parâmetros da URL para o sistema de afiliados
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                const refInput = document.getElementById('reg-ref');
                if (refInput) {
                    refInput.value = refCode.toUpperCase();
                }
            }
        });

        // Evento de envio e tratamento do formulário de registro
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const referral = document.getElementById('reg-ref').value.trim().toUpperCase();
            const termsChecked = document.getElementById('reg-terms').checked;

            if (!termsChecked) {
                showToast("Você precisa aceitar os Termos de Serviço.", true);
                return;
            }

            try {
                // 1. Cria a conta do usuário no Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Atualiza o perfil interno do Auth com o Nome Completo digitado
                await updateProfile(user, { displayName: name });

                // 3. Monta a árvore de dados dele dentro do nó 'users/' seguro do Realtime Database
                await set(ref(db, `users/${user.uid}`), {
                    fullName: name,
                    email: user.email,
                    balance: 0.00, // Inicializa a conta com o saldo em R$ 0,00 reais
                    tickets: 0,    // Inicializa sem cotas ativas
                    referredBy: referral || "NENHUM",
                    createdAt: new Date().toISOString()
                });
                
                console.log("Dados enviados com sucesso para: users/" + user.uid);

                showToast("Conta criada! Redirecionando para o painel...");
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error("Erro no registro:", error.code);
                
                // Tratamento detalhado de erros do servidor Auth
                if (error.code === 'auth/email-already-in-use') {
                    showToast("Este e-mail já está em uso por outra conta.", true);
                } else if (error.code === 'auth/weak-password') {
                    showToast("A senha precisa ter pelo menos 6 dígitos.", true);
                } else if (error.code === 'auth/invalid-email') {
                    showToast("Formato de e-mail inválido.", true);
                } else {
                    showToast("Ocorreu um erro ao processar o cadastro.", true);
                }
            }
        });
    </script>
</body>
</html>
