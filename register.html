<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Roda dos 10</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link para o seu CSS unificado -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Reaproveitando a estrutura de centralização refinada */
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            background-color: var(--bg-dark-base);
        }
        .auth-container {
            background: var(--bg-dark-card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-premium);
            width: 100%;
            max-width: 460px; /* Um pouco mais larga para acomodar campos compostos */
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header .logo {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: #F5A623;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition-smooth);
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .input-group-icon {
            position: relative;
        }
        .input-group-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }
        .input-group-icon input {
            padding-left: 2.8rem !important;
        }
        .terms-label {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.4;
            cursor: pointer;
        }
        .terms-label input {
            accent-color: #F5A623;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-container">
            
            <div class="auth-header">
                <!-- Logo atualizada para manter a consistência da marca Roda dos 10 -->
                <div class="logo">
                    <i class="fa-solid fa-circle-dot"></i> Roda dos <span>10</span>
                </div>
                <p>Crie sua conta para acompanhar suas cotas e comissões</p>
            </div>

            <form id="register-form" autocomplete="off">
                <div class="input-block">
                    <label for="reg-name">Nome Completo</label>
                    <div class="input-group-icon">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Ex: José Lucas" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="reg-email">E-mail</label>
                    <div class="input-group-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="reg-password">Senha</label>
                    <div class="input-group-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                </div>

                <!-- Campo de Indicação (Opcional) - Perfeito para o sistema de afiliados -->
                <div class="input-block">
                    <label for="reg-ref">Código de Indicação (Opcional)</label>
                    <div class="input-group-icon">
                        <i class="fa-solid fa-user-plus"></i>
                        <input type="text" id="reg-ref" placeholder="Ex: REF12345">
                    </div>
                </div>

                <label class="terms-label">
                    <input type="checkbox" id="reg-terms" required>
                    <span>Declaro que li e concordo com os Termos de Serviço e as Políticas de Uso da plataforma Roda dos 10.</span>
                </label>

                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-user-check"></i> Concluir Cadastro
                </button>
            </form>

            <div class="auth-footer">
                Já possui uma conta? <a href="login.html">Fazer Login</a>
            </div>

        </div>
    </div>

    <script>
        // Captura automática de parâmetros da URL para o sistema de afiliados
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if (refCode) {
                const refInput = document.getElementById('reg-ref');
                if (refInput) {
                    refInput.value = refCode.toUpperCase();
                    // Opcional: desabilitar o campo se quiser forçar o código vindo da URL
                    // refInput.readOnly = true; 
                }
            }
        });

        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const referral = document.getElementById('reg-ref').value;

            // Log mantido para validação do desenvolvedor
            console.log('Dados do Cadastro:', { name, email, password, referral });
            
            // Fluxo ativo: redireciona para a tela de login após criar a conta com sucesso
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
