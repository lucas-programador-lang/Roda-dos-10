<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
/* ==========================================================================
   CADASTRO ULTRA PREMIUM — RODA DOS 10
   ========================================================================== */

/* Container de Autenticação com centralização total e efeito de profundidade 3D */
.auth-wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem 1.5rem;
    background-color: var(--bg-dark-base);
    
    /* Mix de Linhas de Grade Modernas + Auras de Luz de Alta Performance */
    background-image: 
        /* 1. Aura de luz dourada focada atrás do card central */
        radial-gradient(circle at 50% 50%, rgba(245, 166, 35, 0.07) 0%, transparent 45%),
        /* 2. Aura esverdeada sutil no canto inferior direito para quebrar a monotonia */
        radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.04) 0%, transparent 40%),
        /* 3. Linhas horizontais milimétricas simulando uma tela de alta tecnologia */
        linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
        /* 4. Linhas verticais milimétricas completando o Grid Premium */
        linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
        
    /* Define o tamanho exato dos quadradinhos da grade de fundo */
    background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
    background-attachment: fixed;
    position: relative;
    overflow: hidden;
}

/* Detalhe estético extra: Círculo de luz flutuante abstrato no canto superior */
.auth-wrapper::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(245, 166, 35, 0.03) 0%, transparent 70%);
    top: -200px;
    left: -100px;
    pointer-events: none;
}

/* Container Principal com efeito Glassmorphism avançado (Ligeiramente mais largo para o Cadastro) */
.auth-container {
    background: linear-gradient(145deg, rgba(18, 28, 50, 0.9) 0%, rgba(12, 19, 34, 0.95) 100%);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 24px;
    width: 100%;
    max-width: 460px;
    padding: 3rem 2.5rem;
    position: relative;
    box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.2),
        0 25px 60px -12px rgba(0, 0, 0, 0.7),
        inset 0 1px 1px rgba(255, 255, 255, 0.08);
    transition: var(--transition-smooth);
    z-index: 2;
}

/* Linha de brilho metálico premium no topo do card */
.auth-container::before {
    content: "";
    position: absolute;
    top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245, 166, 35, 0.4), transparent);
}

/* Cabeçalho do Card */
.auth-header { 
    text-align: center; 
    margin-bottom: 2.2rem; 
}

.auth-header .logo { 
    font-size: 1.8rem; 
    font-weight: 800; 
    margin-bottom: 0.6rem; 
    display: block; 
    letter-spacing: -0.5px;
}

.auth-header p { 
    color: var(--text-muted); 
    font-size: 0.92rem; 
    line-height: 1.5;
}

/* Estilização de Inputs Avançada com Ícones */
.input-group-icon { 
    position: relative; 
    margin-bottom: 1.3rem; 
}

.input-group-icon i {
    position: absolute;
    left: 1.2rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1.05rem;
    transition: var(--transition-smooth);
    pointer-events: none;
}

.input-group-icon input {
    width: 100%;
    background: #090E17;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 1.1rem 1rem 1.1rem 3.2rem;
    border-radius: 14px;
    color: #FFFFFF;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.2px;
    transition: var(--transition-smooth);
}

/* Placeholder sutil */
.input-group-icon input::placeholder {
    color: rgba(148, 163, 184, 0.4);
}

/* Efeito de foco neon profissional herdando as configurações globais de foco */
.input-group-icon input:focus {
    border-color: var(--whatsapp-green);
    background: #0D1421;
    outline: none;
    box-shadow: 0 0 0 4px rgba(0, 230, 118, 0.12);
}

.input-group-icon input:focus + i { 
    color: var(--whatsapp-green); 
    transform: translateY(-50%) scale(1.05);
}

/* Seção de Termos e Condições Customizada */
.terms-label {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 0.88rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
    line-height: 1.5;
    cursor: pointer;
    user-select: none;
    transition: var(--transition-smooth);
}

.terms-label:hover {
    color: var(--text-white);
}

.terms-label input {
    accent-color: var(--whatsapp-green);
    margin-top: 4px;
    width: 18px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
}

.terms-label a { 
    color: var(--whatsapp-green); 
    text-decoration: none; 
    font-weight: 700;
    transition: var(--transition-smooth);
}

.terms-label a:hover {
    color: #FFF;
    text-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
}

/* Reaproveitamento do Botão de Cadastro Estilo Ouro Líquido do Login */
.btn-login {
    width: 100%;
    background: linear-gradient(135deg, #FFE57F 0%, #F5A623 50%, #D48C11 100%);
    background-size: 200% auto;
    border: none;
    padding: 1.1rem;
    border-radius: 14px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    font-size: 1rem;
    color: #05080E;
    margin-bottom: 1.2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 15px rgba(245, 166, 35, 0.2);
    transition: var(--transition-smooth);
}

.btn-login:hover { 
    background-position: right center;
    transform: translateY(-2px); 
    box-shadow: 0 8px 25px rgba(245, 166, 35, 0.4); 
}

.btn-login:active {
    transform: translateY(-0.5px);
}

/* Rodapé do Card */
.auth-footer { 
    text-align: center; 
    margin-top: 1.8rem; 
    font-size: 0.88rem; 
    color: var(--text-muted); 
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    padding-top: 1.5rem;
}

.auth-footer a { 
    color: var(--whatsapp-green); 
    text-decoration: none; 
    font-weight: 700; 
    transition: var(--transition-smooth);
}

.auth-footer a:hover { 
    color: #FFF;
    text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
}

/* ==========================================================================
   OTIMIZAÇÃO RESPONSIVA E COMPORTAMENTO DESKTOP
   ========================================================================== */

/* Dispositivos Grandes (Monitores e Telas de Alta Resolução) */
@media (min-width: 1024px) {
    .auth-container {
        padding: 3.5rem 3rem;
        max-width: 480px; /* Um pouco mais largo para acomodar melhor os formulários de cadastro */
    }
    .auth-container:hover {
        border-color: rgba(245, 166, 35, 0.2);
        box-shadow: 
            0 30px 60px -10px rgba(0, 0, 0, 0.8),
            0 0 50px -5px rgba(245, 166, 35, 0.05);
    }
}

/* Dispositivos Mobile (Smartphones) */
@media (max-width: 480px) {
    .auth-wrapper {
        padding: 1rem;
    }
    .auth-container {
        padding: 2.2rem 1.6rem;
        border-radius: 20px;
    }
    .auth-header .logo {
        font-size: 1.6rem;
    }
    .terms-label {
        font-size: 0.82rem;
        margin-bottom: 1.5rem;
    }
    .terms-label input {
        width: 16px;
        height: 16px;
        margin-top: 2px;
    }
    .btn-login {
        padding: 1rem;
    }
}
</style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-container premium-glass">
            
            <div class="auth-header">
                <div class="logo">
                    <i class="fa-solid fa-circle-dot"></i> Roda dos <span>10</span>
                </div>
                <p>Crie sua conta para acompanhar suas cotas e comissões</p>
            </div>

            <form id="register-form" autocomplete="off">
                <div class="input-block">
                    <label for="reg-name">Nome Completo</label>
                    <div class="input-group-icon">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="reg-name" placeholder="Ex: José Lucas" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="reg-email">E-mail</label>
                    <div class="input-group-icon">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="reg-password">Senha</label>
                    <div class="input-group-icon">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                    </div>
                </div>

                <div class="input-block">
                    <label for="reg-ref">Código de Indicação (Opcional)</label>
                    <div class="input-group-icon">
                        <i class="fa-solid fa-user-plus"></i>
                        <input type="text" id="reg-ref" placeholder="Ex: REF12345">
                    </div>
                </div>

                <label class="terms-label">
                    <input type="checkbox" id="reg-terms" required>
                    <span>Declaro que li e concordo com os Termos de Serviço e as Políticas de Uso da plataforma Roda dos 10.</span>
                </label>

                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-user-check"></i> Concluir Cadastro
                </button>
            </form>

            <div class="auth-footer">
                Já possui uma conta? <a href="login.html">Fazer Login</a>
            </div>

        </div>
    </div>

    <div class="toast-wrapper" id="toastBox">
        <i class="fa-solid fa-circle-check" id="toastIcon"></i>
        <span id="toastMessage">Sucesso!</span>
    </div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
            authDomain: "roda-dos-10.firebaseapp.com",
            databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
            projectId: "roda-dos-10",
            storageBucket: "roda-dos-10.firebasestorage.app",
            messagingSenderId: "1072183237747",
            appId: "1:1072183237747:web:3a41a635187df2db809e06"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        function showToast(message, isError = false) {
            const toast = document.getElementById("toastBox");
            const icon = document.getElementById("toastIcon");
            const msgSpan = document.getElementById("toastMessage");
            
            msgSpan.innerText = message;
            toast.style.borderLeftColor = isError ? "#EF4444" : "#10B981";
            icon.className = isError ? "fa-solid fa-circle-xmark" : "fa-solid fa-circle-check";
            icon.style.color = isError ? "#EF4444" : "#10B981";
            
            toast.classList.add("active");
            setTimeout(() => toast.classList.remove("active"), 3500);
        }

        // CORREÇÃO 1: Captura automática de parâmetros sincronizada com '?id=' vindo do link de indicação
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            // Captura tanto se vier como '?id=' ou como '?ref=' para evitar erros futuros
            const refCode = urlParams.get('id') || urlParams.get('ref');
            
            if (refCode) {
                const refInput = document.getElementById('reg-ref');
                if (refInput) {
                    refInput.value = refCode.trim();
                }
            }
        });

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const referralInput = document.getElementById('reg-ref').value.trim();
            const termsChecked = document.getElementById('reg-terms').checked;

            if (!termsChecked) {
                showToast("Você precisa aceitar os Termos de Serviço.", true);
                return;
            }

            try {
                // 1. Cria a conta no Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Atualiza o perfil interno do Auth
                await updateProfile(user, { displayName: name });

                // CORREÇÃO 2: Configuração limpa do indicador.
                // Se o seu sistema mapeia quem indicou via apelido/username, salvamos o próprio apelido no nó 'referredBy' do indicado.
                let padrinhoParaSalvar = "NENHUM";
                    
                if (referralInput) {
                    console.log("Validando o código recebido:", referralInput);
                    try {
                        // Verifica se o apelido existe mapeado ou se é uma chave válida
                        const snap = await get(ref(db, 'referral_map/' + referralInput.toLowerCase()));
                        
                        if (snap.exists()) {
                            // Se o mapeamento existe, salvamos o referralInput original fornecido pelo link
                            padrinhoParaSalvar = referralInput;
                            console.log("SUCESSO: Padrinho validado! Código salvo:", padrinhoParaSalvar);
                        } else {
                            // Fallback caso seja o UID direto ou não esteja no referral_map ainda
                            padrinhoParaSalvar = referralInput;
                            console.log("AVISO: Código inserido diretamente, salvando o texto original.");
                        }
                    } catch (err) {
                        console.error("Erro ao acessar validação de indicação:", err);
                        padrinhoParaSalvar = referralInput; // Não trava o fluxo de cadastro do cliente
                    }
                }
                    
                // 3. Salva no Realtime Database vinculando ao nó 'lista-afiliados' do seu painel
                await set(ref(db, `users/${user.uid}`), {
                    fullName: name,
                    email: user.email,
                    balance: 0.00,
                    tickets: 0,
                    referredBy: padrinhoParaSalvar, 
                    createdAt: new Date().toISOString()
                });
                                        
                console.log("Dados enviados com sucesso para: users/" + user.uid);

                showToast("Conta criada! Redirecionando para o painel...");
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                console.error("Erro no registro:", error.code);
                
                if (error.code === 'auth/email-already-in-use') {
                    showToast("Este e-mail já está em uso por outra conta.", true);
                } else if (error.code === 'auth/weak-password') {
                    showToast("A senha precisa ter pelo menos 6 dígitos.", true);
                } else if (error.code === 'auth/invalid-email') {
                    showToast("Formato de e-mail inválido.", true);
                } else {
                    showToast("Ocorreu um erro ao processar o cadastro.", true);
                }
            }
        });
    </script>
</body>
</html>
