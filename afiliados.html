<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Afiliados — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
        :root {
            /* Fundo Carbon Deep Blue - Mistura luxuosa de grafite escuro com nuance premium */
            --bg-dark-base: #0B0F17; 
            
            /* Textura sutil de fundo */
            --bg-texture: radial-gradient(circle at 50% 0%, rgba(0, 230, 118, 0.05) 0%, rgba(11, 15, 23, 0) 70%),
                          linear-gradient(rgba(255, 255, 255, 0.003) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255, 255, 255, 0.003) 1px, transparent 1px);
            
            /* Cards Estilo Espelho de Vidro Escuro */
            --bg-dark-card: rgba(20, 29, 43, 0.75); 
            --bg-dark-input: #172233; 
            
            /* Cores de Identidade Limpas */
            --whatsapp-green: #00E676; 
            --text-neon: #02FF8A; 
            --logo-gold: linear-gradient(135deg, #FFF59D 0%, #FFB300 60%, #E65100 100%); 
            --text-white: #FFFFFF; 
            --text-muted: #64748B; 
            --text-secondary-green: #94A3B8; 
            --border-soft: rgba(255, 255, 255, 0.04);
            --border-neon-soft: rgba(0, 230, 118, 0.15);
            --radius-premium: 20px;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            background-color: var(--bg-dark-base); 
            background-image: var(--bg-texture);
            background-size: auto, 30px 30px, 30px 30px;
            color: var(--text-white); 
            overflow-x: hidden; 
            padding-top: 110px; 
            padding-bottom: 60px; 
        }

        /* FLOATING NAVBAR */
        .navbar {
            background: rgba(15, 23, 36, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-soft);
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: calc(100% - 40px);
            max-width: 1160px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .nav-container { margin: 0 auto; padding: 0.7rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--text-white); text-decoration: none; letter-spacing: -0.5px; }
        .logo span { background: var(--logo-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo i { color: var(--whatsapp-green); margin-right: 6px; filter: drop-shadow(0 0 8px rgba(0, 230, 118, 0.4)); }
        .nav-menu { display: flex; align-items: center; gap: 1.2rem; list-style: none; }
        .nav-menu a { color: var(--text-secondary-green); text-decoration: none; font-weight: 600; font-size: 0.88rem; transition: var(--transition-smooth); display: flex; align-items: center; gap: 8px; padding: 0.5rem 0.8rem; border-radius: 10px; }
        .nav-menu a:hover { color: var(--text-white); background: rgba(255, 255, 255, 0.03); }
        .nav-menu a.active { color: var(--text-neon); background: rgba(0, 230, 118, 0.06); border: 1px solid rgba(0, 230, 118, 0.1); }

        /* LAYOUT PRINCIPAL */
        .main-layout { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .page-header { margin-bottom: 2.5rem; }
        .page-header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.5px; }
        .page-header p { color: var(--text-muted); font-size: 0.95rem; }

        /* PREMIUM CARD - INDICAÇÃO */
        .premium-card { 
            background: var(--bg-dark-card); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-soft); 
            border-radius: var(--radius-premium); 
            padding: 2.5rem; 
            max-width: 600px; 
            margin: 0 auto; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }
        .card-icon { 
            font-size: 2.8rem; 
            color: #FFB300; 
            margin-bottom: 1.2rem; 
            filter: drop-shadow(0 0 12px rgba(255, 179, 0, 0.25));
        }
        
        .commission-badge { 
            background: rgba(0, 230, 118, 0.08); 
            color: var(--text-neon); 
            padding: 0.5rem 1.2rem; 
            border-radius: 50px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 1.5rem; 
            border: 1px solid rgba(0, 230, 118, 0.2); 
        }

        .referral-container { display: flex; gap: 12px; margin-top: 1.8rem; }
        .referral-input { 
            flex-grow: 1; 
            padding: 0.9rem 1.2rem; 
            background: var(--bg-dark-input); 
            border: 1px solid var(--border-soft); 
            border-radius: 12px; 
            color: white; 
            font-size: 0.95rem; 
            outline: none; 
            transition: var(--transition-smooth);
        }
        .referral-input:focus { border-color: var(--border-neon-soft); box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.1); }
        
        .btn-copy { 
            background: var(--logo-gold); 
            color: #000; 
            border: none; 
            padding: 0 1.8rem; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: var(--transition-smooth); 
            box-shadow: 0 6px 20px rgba(255, 179, 0, 0.25); 
        }
        .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 179, 0, 0.35); }

        /* TOAST SYSTEM */
        .toast-wrapper { 
            position: fixed; 
            top: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #0E1420; 
            border-left: 5px solid var(--whatsapp-green); 
            padding: 1.2rem 2rem; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            z-index: 999999; 
            width: calc(100% - 2rem); 
            max-width: 420px; 
            opacity: 0; 
            transition: var(--transition-smooth); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .toast-wrapper.active { top: 30px; opacity: 1; transform: translateX(-50%) translateY(0); }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            body { padding-top: 165px; }
            .navbar { top: 10px; width: calc(100% - 20px); border-radius: 14px; }
            .nav-container { flex-direction: column; gap: 0.6rem; padding: 0.8rem; text-align: center; }
            .nav-menu { gap: 0.3rem; flex-wrap: wrap; justify-content: center; width: 100%; }
            .nav-menu a { font-size: 0.78rem; padding: 0.4rem 0.6rem; justify-content: center; border-radius: 8px; }
            .referral-container { flex-direction: column; gap: 10px; }
            .btn-copy { padding: 1rem; width: 100%; }
            .page-header { text-align: center; }
            .premium-card { width: calc(100% - 10px); padding: 2rem 1.2rem; }
        }
/* --- ESTILO LOGO PREMIUM --- */
.logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    padding: 4px; /* Pequeno espaçamento interno para o hover não 'cortar' */
    border-radius: 12px;
    transition: var(--transition-smooth);
}

.logo img {
    max-height: 45px;
    width: auto;
    /* Adicionamos uma opacidade sutil inicial para transição mais elegante */
    opacity: 0.9;
    filter: drop-shadow(0 4px 10px rgba(0, 230, 118, 0.3));
    /* Aumentamos a suavidade do transform */
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    backface-visibility: hidden; /* Evita tremidos na animação */
}

.logo:hover img {
    opacity: 1;
    filter: drop-shadow(0 0 20px rgba(0, 230, 118, 0.5));
    transform: scale(1.08) rotate(-1deg); /* Leve rotação dá um ar mais orgânico/premium */
}

/* Efeito de "brilho interno" no container da logo ao passar o mouse */
.logo:hover {
    background: rgba(255, 255, 255, 0.03);
}
</style>
</head>
<body>

   <nav class="navbar">
    <div class="nav-container">
        <a href="dashboard.html" class="logo">
            <img src="logo.png" alt="Logo Roda dos 10">
        </a>
        
        <ul class="nav-menu">
            <li><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Painel</a></li>
            <li><a href="afiliados.html" class="active"><i class="fa-solid fa-users"></i> Afiliados</a></li>
            <li><a href="perfil.html"><i class="fa-solid fa-user"></i> Perfil</a></li>
            <li><a href="carteira.html"><i class="fa-solid fa-wallet"></i> Carteira</a></li>
            <li><a href="#" id="btn-logout" class="logout-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</a></li>
        </ul>
    </div>
</nav>

    <main class="main-layout">
    <header class="page-header">
        <h1>Indicação Premium</h1>
        <p>Garanta comissões imediatas recomendando nossa plataforma para novos compradores.</p>
    </header>

    <div class="premium-card">
        <div class="commission-badge"><i class="fa-solid fa-gift"></i> Indicação: 20% de Comissão Única</div>
        <div class="card-icon"><i class="fa-solid fa-share-nodes"></i></div>
        <h3>Seu Link Exclusivo</h3>
        <div class="referral-container">
            <input type="text" id="referral-link" class="referral-input" readonly>
            <button id="btn-copy-link" class="btn-copy">Copiar</button>
        </div>
    </div>

    <div class="premium-card" style="margin-top: 2rem;">
        <h3>Seus Indicados</h3>
        <table style="width: 100%; margin-top: 1.5rem; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="color: var(--text-muted); border-bottom: 1px solid var(--border-soft);">
                    <th style="padding: 10px;">Nome do Indicado</th>
                    <th style="padding: 10px;">Comissão (20%)</th>
                </tr>
            </thead>
            <tbody id="lista-afiliados">
                </tbody>
        </table>
    </div>
</main>

    <div class="toast-wrapper" id="toastBox">
        <i class="fa-solid fa-circle-check"></i>
        <span>Link de indicação copiado!</span>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
        authDomain: "roda-dos-10.firebaseapp.com",
        databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
        projectId: "roda-dos-10",
        storageBucket: "roda-dos-10.firebasestorage.app",
        messagingSenderId: "1072183237747",
        appId: "1:1072183237747:web:3a41a635187df2db809e06"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userSnapshot = await get(ref(db, `users/${user.uid}`));
            const userData = userSnapshot.val();
            
            // O apelido agora é buscado corretamente.
            const apelido = userData?.username || user.uid; 

            document.getElementById("referral-link").value = window.location.origin + '/r?id=' + apelido;

            const usersRef = ref(db, 'users');
            const q = query(usersRef, orderByChild('referredBy'), equalTo(user.uid));
            
            const snapshot = await get(q);
            const tabela = document.getElementById("afiliados-lista"); 
            tabela.innerHTML = "";

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const dados = childSnapshot.val();
                    const nomeIndicado = dados.fullName || 'Sem nome';
                    // Certifique-se de que o campo 'valor' existe no registro do indicado no banco
                    const valorCompra = dados.valor || 0; 
                    const comissao = (parseFloat(valorCompra) * 0.20).toFixed(2);
                    
                    tabela.innerHTML += `
                        <tr style="border-bottom: 1px solid var(--border-soft);">
                            <td style="padding: 10px;">${nomeIndicado}</td>
                            <td style="padding: 10px; color: var(--text-neon);">R$ ${comissao}</td>
                        </tr>
                    `;
                });
            }
        } else {
            window.location.href = "login.html";
        }
    });

    document.getElementById("btn-copy-link").addEventListener("click", () => {
        const linkInput = document.getElementById("referral-link");
        linkInput.select();
        navigator.clipboard.writeText(linkInput.value);
        const toast = document.getElementById("toastBox");
        toast.classList.add("active");
        setTimeout(() => toast.classList.remove("active"), 3000);
    });

    document.getElementById("btn-logout").addEventListener("click", (e) => {
        e.preventDefault();
        signOut(auth).then(() => { window.location.href = "login.html"; });
    });
</script>
</body>
</html>
