<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Afiliados — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <style>
    :root {
        /* Fundo Carbon Deep Blue - Mistura luxuosa de grafite escuro com nuance premium */
        --bg-dark-base: #0B0F17; 
        
        /* Textura sutil de fundo */
        --bg-texture: radial-gradient(circle at 50% 0%, rgba(0, 230, 118, 0.05) 0%, rgba(11, 15, 23, 0) 70%),
                      linear-gradient(rgba(255, 255, 255, 0.003) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255, 255, 255, 0.003) 1px, transparent 1px);
        
        /* Cards Estilo Espelho de Vidro Escuro */
        --bg-dark-card: rgba(20, 29, 43, 0.75); 
        --bg-dark-input: #172233; 
        
        /* Cores de Identidade Limpas */
        --whatsapp-green: #00E676; 
        --text-neon: #02FF8A; 
        --logo-gold: linear-gradient(135deg, #FFF59D 0%, #FFB300 60%, #E65100 100%); 
        --text-white: #FFFFFF; 
        --text-muted: #64748B; 
        --text-secondary-green: #94A3B8; 
        --border-soft: rgba(255, 255, 255, 0.04);
        --border-neon-soft: rgba(0, 230, 118, 0.15);
        --radius-premium: 20px;
        --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    
    body { 
        background-color: var(--bg-dark-base); 
        background-image: var(--bg-texture);
        background-size: auto, 30px 30px, 30px 30px;
        color: var(--text-white); 
        overflow-x: hidden; 
        display: flex; /* Alinha a sidebar e o conteúdo principal lado a lado */
        min-height: 100vh;
    }

    /* ==========================================================================
       ESTRUTURA DA NOVA SIDEBAR LATERAL FIXA
       ========================================================================== */
    .sidebar {
        width: 260px;
        height: 100vh;
        background: rgba(15, 23, 36, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-right: 1px solid var(--border-soft);
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        padding: 2rem 1.2rem;
        box-shadow: 10px 0 40px rgba(0, 0, 0, 0.3);
    }

    /* Topo da Sidebar (Logo) */
    .sidebar-header {
        display: flex;
        justify-content: center;
        align-items: center;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--border-soft);
    }

    .logo { 
        font-size: 1.3rem; 
        font-weight: 800; 
        color: var(--text-white); 
        text-decoration: none; 
        letter-spacing: -0.5px; 
        display: flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 12px;
        transition: var(--transition-smooth);
    }
    .logo span { background: var(--logo-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo i { color: var(--whatsapp-green); margin-right: 6px; filter: drop-shadow(0 0 8px rgba(0, 230, 118, 0.4)); }

    .logo img {
        max-height: 45px;
        width: auto;
        opacity: 0.9;
        filter: drop-shadow(0 4px 10px rgba(0, 230, 118, 0.3));
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        backface-visibility: hidden;
    }
    .logo:hover img {
        opacity: 1;
        filter: drop-shadow(0 0 20px rgba(0, 230, 118, 0.5));
        transform: scale(1.06) rotate(-1deg);
    }
    .logo:hover { background: rgba(255, 255, 255, 0.02); }

    /* Lista de Menus */
    .sidebar-menu {
        list-style: none;
        margin-top: 2rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex: 1; /* Empurra o rodapé para a parte inferior da tela */
    }

    .menu-item {
        color: var(--text-secondary-green);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: var(--transition-smooth);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0.8rem 1.2rem;
        border-radius: 12px;
        border: 1px solid transparent;
    }
    .menu-item i {
        font-size: 1.1rem;
        width: 20px;
        text-align: center;
    }
    .menu-item:hover {
        color: var(--text-white);
        background: rgba(255, 255, 255, 0.03);
    }
    .menu-item.active {
        color: var(--text-neon);
        background: rgba(0, 230, 118, 0.06);
        border: 1px solid rgba(0, 230, 118, 0.1);
    }

    /* Rodapé da Sidebar */
    .sidebar-footer {
        border-top: 1px solid var(--border-soft);
        padding-top: 1.5rem;
    }
    .logout-link { color: #F87171 !important; }
    .logout-link:hover { background: rgba(248, 113, 113, 0.08) !important; }

    /* ==========================================================================
       LAYOUT PRINCIPAL DE CONTEÚDO (Ajustado ao lado da Sidebar)
       ========================================================================== */
    .main-layout { 
        flex: 1;
        margin-left: 260px; /* Garante que o conteúdo comece após a sidebar */
        max-width: 1200px; 
        padding: 2.5rem 2rem; 
        box-sizing: border-box;
    }

    .page-header { margin-bottom: 2.5rem; }
    .page-header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.5px; }
    .page-header p { color: var(--text-muted); font-size: 0.95rem; }

    /* PREMIUM CARD - INDICAÇÃO */
    .premium-card { 
        background: var(--bg-dark-card); 
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-soft); 
        border-radius: var(--radius-premium); 
        padding: 2.5rem; 
        max-width: 600px; 
        margin: 0 auto; 
        text-align: center; 
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }
    .card-icon { 
        font-size: 2.8rem; 
        color: #FFB300; 
        margin-bottom: 1.2rem; 
        filter: drop-shadow(0 0 12px rgba(255, 179, 0, 0.25));
    }
    
    .commission-badge { 
        background: rgba(0, 230, 118, 0.08); 
        color: var(--text-neon); 
        padding: 0.5rem 1.2rem; 
        border-radius: 50px; 
        font-weight: 700; 
        font-size: 0.85rem; 
        display: inline-flex; 
        align-items: center; 
        gap: 8px; 
        margin-bottom: 1.5rem; 
        border: 1px solid rgba(0, 230, 118, 0.2); 
    }

    .referral-container { display: flex; gap: 12px; margin-top: 1.8rem; }
    .referral-input { 
        flex-grow: 1; 
        padding: 0.9rem 1.2rem; 
        background: var(--bg-dark-input); 
        border: 1px solid var(--border-soft); 
        border-radius: 12px; 
        color: white; 
        font-size: 0.95rem; 
        outline: none; 
        transition: var(--transition-smooth);
    }
    .referral-input:focus { border-color: var(--border-neon-soft); box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.1); }
    
    .btn-copy { 
        background: var(--logo-gold); 
        color: #000; 
        border: none; 
        padding: 0 1.8rem; 
        border-radius: 12px; 
        font-weight: 800; 
        cursor: pointer; 
        transition: var(--transition-smooth); 
        box-shadow: 0 6px 20px rgba(255, 179, 0, 0.25); 
    }
    .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 179, 0, 0.35); }

    /* TOAST SYSTEM */
    .toast-wrapper { 
        position: fixed; 
        top: -100px; 
        left: 50%; 
        transform: translateX(-50%); 
        background: #0E1420; 
        border-left: 5px solid var(--whatsapp-green); 
        padding: 1.2rem 2rem; 
        border-radius: 14px; 
        display: flex; 
        align-items: center; 
        gap: 14px; 
        z-index: 999999; 
        width: calc(100% - 2rem); 
        max-width: 420px; 
        opacity: 0; 
        transition: var(--transition-smooth); 
        box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        border: 1px solid rgba(255, 255, 255, 0.05); 
    }
    .toast-wrapper.active { top: 30px; opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ==========================================================================
       RESPONSIVIDADE INTELIGENTE
       ========================================================================== */
    @media (max-width: 992px) {
        body { flex-direction: column; }
        
        /* A sidebar vira uma barra superior prática em tablets e celulares */
        .sidebar {
            width: 100%;
            height: auto;
            position: relative;
            padding: 1rem;
            border-right: none;
            border-bottom: 1px solid var(--border-soft);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .sidebar-header { padding-bottom: 1rem; }
        .sidebar-menu { 
            flex-direction: row; 
            margin-top: 1rem; 
            justify-content: center; 
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .menu-item { padding: 0.5rem 0.8rem; font-size: 0.8rem; border-radius: 8px; }
        .sidebar-footer { display: none; } /* Remove redundância do botão sair no menu responsivo */
        
        .main-layout { margin-left: 0; padding: 1.5rem 1rem; }
    }

    @media (max-width: 768px) {
        .referral-container { flex-direction: column; gap: 10px; }
        .btn-copy { padding: 1rem; width: 100%; }
        .page-header { text-align: center; }
        .premium-card { width: calc(100% - 10px); padding: 2rem 1.2rem; }
    }
</style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
        <a href="dashboard.html" class="logo">
            <img src="logo.png" alt="Logo Roda dos 10">
        </a>
    </div>
    
    <ul class="sidebar-menu">
        <li>
            <a href="dashboard.html" class="menu-item">
                <i class="fa-solid fa-chart-pie"></i> 
                <span>Painel</span>
            </a>
        </li>
        <li>
            <a href="afiliados.html" class="menu-item active">
                <i class="fa-solid fa-users"></i> 
                <span>Afiliados</span>
            </a>
        </li>
        <li>
            <a href="perfil.html" class="menu-item">
                <i class="fa-solid fa-user"></i> 
                <span>Perfil</span>
            </a>
        </li>
    </ul>

    <div class="sidebar-footer">
        <a href="#" id="btn-logout" class="menu-item logout-link">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> 
            <span>Sair</span>
        </a>
    </div>
</aside>

    <main class="main-layout">
    <header class="page-header">
        <h1>Indicação Premium</h1>
        <p>Garanta comissões imediatas recomendando nossa plataforma para novos compradores.</p>
    </header>

    <div class="premium-card">
        <div class="commission-badge"><i class="fa-solid fa-gift"></i> Indicação: 20% de Comissão Única</div>
        <div class="card-icon"><i class="fa-solid fa-share-nodes"></i></div>
        <h3>Seu Link Exclusivo</h3>
        <div class="referral-container">
            <input type="text" id="referral-link" class="referral-input" readonly>
            <button id="btn-copy-link" class="btn-copy">Copiar</button>
        </div>
    </div>

    <div class="premium-card" style="margin-top: 2rem;">
        <h3>Seus Indicados</h3>
        <table style="width: 100%; margin-top: 1.5rem; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="color: var(--text-muted); border-bottom: 1px solid var(--border-soft);">
                    <th style="padding: 10px;">Nome do Indicado</th>
                    <th style="padding: 10px;">Comissão (20%)</th>
                </tr>
            </thead>
            <tbody id="lista-afiliados">
                <tr>
                    <td colspan="2" style="padding: 15px; text-align: center; color: var(--text-muted);">Buscando indicados...</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

    <div class="toast-wrapper" id="toastBox">
        <i class="fa-solid fa-circle-check"></i>
        <span>Link de indicação copiado!</span>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, query, orderByChild, equalTo, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
        authDomain: "roda-dos-10.firebaseapp.com",
        databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
        projectId: "roda-dos-10",
        storageBucket: "roda-dos-10.firebasestorage.app",
        messagingSenderId: "1072183237747",
        appId: "1:1072183237747:web:3a41a635187df2db809e06"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userSnapshot = await get(ref(db, `users/${user.uid}`));
            const userData = userSnapshot.val();
            
            // GARANTIA PREMIUM: Força o apelido para letras minúsculas se ele existir, ou usa o UID como fallback seguro
            const apelido = userData?.username ? userData.username.trim().toLowerCase() : user.uid; 

            // Define o link idêntico ao esperado pelo r.html
            document.getElementById("referral-link").value = window.location.origin + '/r.html?id=' + apelido;

            const usersRef = ref(db, 'users');
            
            // Filtra os indicados cujo campo 'referredBy' combine perfeitamente com o apelido/UID do padrinho
            const q = query(usersRef, orderByChild('referredBy'), equalTo(apelido));
            
            const snapshot = await get(q);
            const tabela = document.getElementById("lista-afiliados");
            tabela.innerHTML = "";

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const dados = childSnapshot.val();
                    const nomeIndicado = dados.fullName || dados.username || 'Indicado Sem Nome';
                    
                    // Validação para evitar falhas caso a pessoa cadastrou mas não comprou ainda
                    const valorCompra = dados.balance || dados.valor || 0; 
                    const comissao = (parseFloat(valorCompra) * 0.20).toFixed(2).replace('.', ',');
                    
                    tabela.innerHTML += `
                        <tr style="border-bottom: 1px solid var(--border-soft);">
                            <td style="padding: 12px 10px; color: var(--text-white); font-weight: 500;">${nomeIndicado}</td>
                            <td style="padding: 12px 10px; color: var(--text-neon); font-weight: 700;">R$ ${comissao}</td>
                        </tr>
                    `;
                });
            } else {
                tabela.innerHTML = `
                    <tr>
                        <td colspan="2" style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
                            Nenhum indicado cadastrado por este link até o momento.
                        </td>
                    </tr>
                `;
            }
        } else {
            window.location.href = "login.html";
        }
    });

    document.getElementById("btn-copy-link").addEventListener("click", () => {
        const linkInput = document.getElementById("referral-link");
        linkInput.select();
        navigator.clipboard.writeText(linkInput.value);
        const toast = document.getElementById("toastBox");
        toast.classList.add("active");
        setTimeout(() => toast.classList.remove("active"), 3000);
    });

    // Proteção para o Botão Sair (Logout)
    const btnLogout = document.getElementById("btn-logout");
    if (btnLogout) {
        btnLogout.addEventListener("click", (e) => {
            e.preventDefault();
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                console.error("Erro ao sair:", error);
            });
        });
    }
});
</script>
</body>
</html>
