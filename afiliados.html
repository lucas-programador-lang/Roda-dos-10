<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Afiliados — Roda dos 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark-base: #070B13;
            --bg-dark-card: #111A2E;
            --bg-dark-input: #1A2540;
            --primary-gold: linear-gradient(135deg, #FFE57F 0%, #F5A623 100%);
            --neon-green: #10B981;
            --text-white: #FFFFFF;
            --text-muted: #94A3B8;
            --border-soft: rgba(255, 255, 255, 0.06);
            --radius-premium: 20px;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark-base); color: var(--text-white); padding-bottom: 60px; }

        .navbar { background: rgba(17, 26, 46, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-soft); position: sticky; top: 0; z-index: 999; }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 1.2rem 1rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--text-white); text-decoration: none; }
        .logo span { background: var(--primary-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo i { color: #F5A623; margin-right: 6px; }
        .nav-menu { display: flex; align-items: center; gap: 1.5rem; list-style: none; }
        .nav-menu a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .nav-menu a.active { color: #F5A623; }
        .logout-link { color: #EF4444 !important; }

        .main-layout { max-width: 1200px; margin: 2.5rem auto; padding: 0 1rem; }
        .page-header { margin-bottom: 2.5rem; }
        .page-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.4rem; }
        .page-header p { color: var(--text-muted); }

        .premium-card { background: var(--bg-dark-card); border: 1px solid var(--border-soft); border-radius: var(--radius-premium); padding: 2.5rem; text-align: center; max-width: 600px; margin: 0 auto; }
        .card-icon { font-size: 2.5rem; color: #F5A623; margin-bottom: 1rem; }
        
        .referral-container { display: flex; gap: 10px; margin-top: 1.5rem; }
        .referral-input { flex-grow: 1; padding: 0.9rem; background: var(--bg-dark-input); border: 1px solid var(--border-soft); border-radius: 10px; color: white; font-size: 0.9rem; outline: none; }
        .btn-copy { background: var(--primary-gold); color: #000; border: none; padding: 0 1.5rem; border-radius: 10px; font-weight: 700; cursor: pointer; transition: var(--transition-smooth); }
        .btn-copy:hover { opacity: 0.9; }

        .toast-wrapper { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #111A2E; border-left: 4px solid var(--neon-green); padding: 1rem 1.5rem; border-radius: 10px; display: flex; align-items: center; gap: 12px; z-index: 99999; width: calc(100% - 2rem); max-width: 400px; opacity: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-soft); }
        .toast-wrapper.active { top: 20px; opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 1rem; padding: 1rem; }
            .nav-menu { gap: 1rem; flex-wrap: wrap; justify-content: center; }
            .referral-container { flex-direction: column; }
            .btn-copy { padding: 0.9rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="logo"><i class="fa-solid fa-circle-dot"></i> Roda dos <span>10</span></a>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Meu Painel</a></li>
                <li><a href="afiliados.html" class="active"><i class="fa-solid fa-users"></i> Afiliados</a></li>
                <li><a href="perfil.html"><i class="fa-solid fa-user"></i> Perfil</a></li>
                <li><a href="#" id="btn-logout" class="logout-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-layout">
        <header class="page-header">
            <h1>Painel de Afiliados</h1>
            <p>Compartilhe seu link exclusivo e ganhe comissões recorrentes direto no seu saldo.</p>
        </header>

        <div class="premium-card">
            <div class="card-icon"><i class="fa-solid fa-share-nodes"></i></div>
            <h3>Seu Link de Indicação Premium</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">Qualquer usuário que se cadastrar por ele vira seu afiliado.</p>
            
            <div class="referral-container">
                <input type="text" id="referral-link" class="referral-input" readonly>
                <button id="btn-copy-link" class="btn-copy"><i class="fa-regular fa-copy"></i> Copiar</button>
            </div>
        </div>
    </main>

    <div class="toast-wrapper" id="toastBox">
        <i class="fa-solid fa-circle-check"></i>
        <span>Link de afiliado copiado!</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBURKDf_g7jyNGroNFtn6_-Pc6LwnqFBPg",
            authDomain: "roda-dos-10.firebaseapp.com",
            databaseURL: "https://roda-dos-10-default-rtdb.firebaseio.com",
            projectId: "roda-dos-10",
            storageBucket: "roda-dos-10.firebasestorage.app",
            messagingSenderId: "1072183237747",
            appId: "1:1072183237747:web:3a41a635187df2db809e06"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const currentUrl = window.location.origin + window.location.pathname.replace('afiliados.html', 'register.html');
                document.getElementById("referral-link").value = `${currentUrl}?ref=${user.uid}`;
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById("btn-copy-link").addEventListener("click", () => {
            const linkInput = document.getElementById("referral-link");
            linkInput.select();
            navigator.clipboard.writeText(linkInput.value);
            
            const toast = document.getElementById("toastBox");
            toast.classList.add("active");
            setTimeout(() => toast.classList.remove("active"), 3000);
        });

        document.getElementById("btn-logout").addEventListener("click", (e) => {
            e.preventDefault();
            signOut(auth).then(() => { window.location.href = "login.html"; });
        });
    </script>
</body>
</html>
